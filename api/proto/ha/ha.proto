syntax = "proto3";

package osvbng.ha.v1;

option go_package = "github.com/veesix-networks/osvbng/api/proto/ha;hapb";

service HAPeerService {
  rpc Heartbeat(stream HeartbeatMessage) returns (stream HeartbeatMessage);
  rpc NotifySRGState(SRGStateNotification) returns (SRGStateAck);
  rpc RequestSwitchover(SwitchoverRequest) returns (SwitchoverResponse);
  rpc SyncSession(SyncSessionRequest) returns (SyncSessionResponse);
  rpc BulkSync(BulkSyncRequest) returns (stream BulkSyncResponse);
  rpc SyncCGNATMapping(SyncCGNATMappingRequest) returns (SyncCGNATMappingResponse);
  rpc BulkSyncCGNAT(BulkSyncCGNATRequest) returns (stream BulkSyncCGNATResponse);
}

message HeartbeatMessage {
  string node_id = 1;
  uint64 sequence = 2;
  int64 timestamp_ns = 3;
  repeated SRGStatus srg_statuses = 4;
  string config_hash = 5;
}

message SRGStatus {
  string srg_name = 1;
  string state = 2;
  uint64 session_count = 3;
  uint64 last_sync_seq = 4;
  uint32 priority = 5;
}

message SRGStateNotification {
  string srg_name = 1;
  string new_state = 2;
  string prev_state = 3;
  int64 timestamp_ns = 4;
}

message SRGStateAck {
  bool acknowledged = 1;
}

message SwitchoverRequest {
  repeated string srg_names = 1;
  bool graceful = 2;
}

message SwitchoverResponse {
  bool success = 1;
  string message = 2;
}

enum SyncAction {
  SYNC_ACTION_UNSPECIFIED = 0;
  SYNC_ACTION_CREATE = 1;
  SYNC_ACTION_UPDATE = 2;
  SYNC_ACTION_DELETE = 3;
}

message SessionCheckpoint {
  string session_id = 1;
  string srg_name = 2;
  string access_type = 3;

  bytes mac = 4;
  uint32 outer_vlan = 5;
  uint32 inner_vlan = 6;
  string username = 7;
  string aaa_session_id = 8;

  bytes ipv4_address = 9;
  bytes ipv4_netmask = 10;
  bytes ipv4_gateway = 11;
  bytes ipv6_address = 12;
  bytes ipv6_prefix = 13;
  uint32 ipv6_prefix_len = 14;

  uint32 ipv4_lease_time = 15;
  uint32 ipv6_lease_time = 16;
  int64 bound_at_ns = 17;
  int64 ipv6_bound_at_ns = 18;

  bytes circuit_id = 19;
  bytes remote_id = 20;
  bytes client_id = 21;
  string hostname = 22;
  bytes dhcpv6_duid = 23;

  string vrf = 24;
  string service_group = 25;
  string subscriber_group = 26;

  uint32 pppoe_session_id = 27;
  string lcp_state = 28;
  string ipcp_state = 29;
  string ipv6cp_state = 30;
  string service_name = 31;

  string ipv4_pool = 32;
  string iana_pool = 33;
  string pd_pool = 34;

  uint32 outer_tpid = 35;
}

message SyncSessionRequest {
  string srg_name = 1;
  uint64 sequence = 2;
  SyncAction action = 3;
  SessionCheckpoint session = 4;
}

message SyncSessionResponse {
  bool success = 1;
  uint64 last_sync_seq = 2;
}

message BulkSyncRequest {
  repeated string srg_names = 1;
  uint64 from_sequence = 2;
}

message BulkSyncResponse {
  string srg_name = 1;
  repeated SessionCheckpoint sessions = 2;
  uint64 sequence = 3;
  bool last_page = 4;
}

message CGNATMappingCheckpoint {
  string session_id = 1;
  string srg_name = 2;
  string pool_name = 3;
  bytes inside_ip = 4;
  bytes outside_ip = 5;
  uint32 port_block_start = 6;
  uint32 port_block_end = 7;
  uint32 inside_vrf_id = 8;
  uint32 sw_if_index = 9;
}

message SyncCGNATMappingRequest {
  string srg_name = 1;
  uint64 sequence = 2;
  SyncAction action = 3;
  CGNATMappingCheckpoint mapping = 4;
}

message SyncCGNATMappingResponse {
  bool success = 1;
  uint64 last_sync_seq = 2;
}

message BulkSyncCGNATRequest {
  repeated string srg_names = 1;
}

message BulkSyncCGNATResponse {
  string srg_name = 1;
  repeated CGNATMappingCheckpoint mappings = 2;
  uint64 sequence = 3;
  bool last_page = 4;
}
