{
    "Dhcp4": {
        "interfaces-config": {
            "interfaces": ["eth0"]
        },
        "lease-database": {
            "type": "memfile",
            "persist": false
        },
        "valid-lifetime": 3600,
        "renew-timer": 1800,
        "rebind-timer": 3150,

        "subnet4": [
            {
                "id": 1,
                "subnet": "10.255.0.0/16",
                "pools": [
                    { "pool": "10.255.0.100 - 10.255.255.254" }
                ],
                "option-data": [
                    { "name": "routers", "data": "10.255.0.1" },
                    { "name": "domain-name-servers", "data": "8.8.8.8, 8.8.4.4" }
                ],
                "relay": {
                    "ip-addresses": ["172.30.0.2"]
                }
            }
        ],

        "loggers": [
            {
                "name": "kea-dhcp4",
                "output_options": [
                    { "output": "stdout" }
                ],
                "severity": "INFO",
                "debuglevel": 0
            }
        ]
    }
}
