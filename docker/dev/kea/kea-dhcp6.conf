{
    "Dhcp6": {
        "interfaces-config": {
            "interfaces": ["eth0/fd00:30::5"]
        },
        "lease-database": {
            "type": "memfile",
            "persist": false
        },
        "preferred-lifetime": 3600,
        "valid-lifetime": 7200,
        "renew-timer": 1800,
        "rebind-timer": 3150,

        "subnet6": [
            {
                "id": 1,
                "subnet": "2001:db8:0:1::/64",
                "pools": [
                    { "pool": "2001:db8:0:1::2000 - 2001:db8:0:1::2fff" }
                ],
                "pd-pools": [
                    {
                        "prefix": "2001:db8:200::",
                        "prefix-len": 40,
                        "delegated-len": 56
                    }
                ],
                "relay": {
                    "ip-addresses": ["2001:db8:0:1::1"]
                },
                "option-data": [
                    { "name": "dns-servers", "data": "2001:4860:4860::8888, 2001:4860:4860::8844" }
                ]
            }
        ],

        "loggers": [
            {
                "name": "kea-dhcp6",
                "output_options": [
                    { "output": "stdout" }
                ],
                "severity": "INFO",
                "debuglevel": 0
            }
        ]
    }
}
