subscriber-groups:
    groups:
        default:
            access-type: ipoe
            ipv4-profile: default
            ipv6-profile: default-v6
            vlans:
                - svlan: "100-110"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy
        pppoe:
            access-type: pppoe
            ipv4-profile: default
            vlans:
                - svlan: "200-210"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy

ipv4-profiles:
    default:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        pools:
            - name: subscriber-pool
              network: 10.255.0.0/16
              priority: 1
        dhcp:
            lease-time: 3600

ipv6-profiles:
    default-v6:
        iana-pools:
            - name: wan-link-pool
              network: 2001:db8:0:1::/64
              range_start: 2001:db8:0:1::1000
              range_end: 2001:db8:0:1::ffff
              gateway: 2001:db8:0:1::1
              preferred_time: 3600
              valid_time: 7200
        pd-pools:
            - name: subscriber-pd-pool
              network: 2001:db8:100::/40
              prefix_length: 56
              preferred_time: 3600
              valid_time: 7200
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844

dhcp:
    provider: local

dhcpv6:
    provider: local

interfaces:
    eth0:
        description: Management Interface
        enabled: true
    eth1:
        description: Access Interface
        enabled: true
        bng_mode: access
    loop100:
        description: Subscriber Gateway Loopback
        enabled: true
        address:
            ipv4:
                - 10.255.0.1/32
            ipv6:
                - 2001:db8:0:1::1/128
        lcp: true

aaa:
    auth_provider: local
    nas_identifier: osvbng-2
    policy:
        - name: default-policy
          format: $mac-address$
          max_concurrent_sessions: 1

ha:
    enabled: true
    node_id: bng-2
    peer:
        address: 172.30.0.2:50051
    heartbeat:
        interval: 1s
        timeout: 5s
    srgs:
        default:
            virtual_mac: "02:00:5e:00:01:01"
            priority: 50
            subscriber_groups:
                - default
                - pppoe

plugins:
    exporter.prometheus:
        enabled: true
        listen_address: :9090
    northbound.api:
        enabled: true
        listen_address: :8080
    subscriber.auth.local:
        allow_all: true
        database_path: /tmp/osvbng.db

monitoring:
  collect_interval: 30s

logging:
    format: text
    level: info
    components:
        ha: debug

dataplane:
    lcp-netns: dataplane
    statseg:
        size: "512m"
        page-size: "4k"
        per-node-counters: false

watchdog:
  enabled: true
  check-interval: 3s
  targets:
    vpp:
      enabled: true
      timeout: 2s
      failure-threshold: 3
      on-failure: restart
      min-restart-interval: 30s
      reconnect-backoff: 2s
      reconnect-max-backoff: 30s
      critical: true
    frr:
      enabled: true
      timeout: 2s
      failure-threshold: 3
      on-failure: warn
      critical: false
