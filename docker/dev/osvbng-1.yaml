vrfs:
  cgnat:
    address-families:
      ipv4-unicast: {}
      ipv6-unicast: {}
  CUSTOMER-A:
    description: "Test L3VPN customer"
    rd: "65000:100"
    import-route-targets:
      - "65000:100"
    export-route-targets:
      - "65000:100"
    address-families:
      ipv4-unicast: {}
      ipv6-unicast: {}

routing-policies:
  prefix-sets:
    BOGONS-V4:
      - prefix: "10.0.0.0/8"
        action: permit
      - prefix: "172.16.0.0/12"
        action: permit
    OWN-PREFIXES-V4:
      - prefix: "203.0.113.0/24"
        action: permit
    REDIST-ALLOWED-V4:
      - prefix: "203.0.113.0/24"
        le: 24
        action: permit

  prefix-sets-v6:
    OWN-PREFIXES-V6:
      - prefix: "2001:db8::/32"
        action: permit

  community-sets:
    BLACKHOLE:
      - "64500:666"
    PEER-TAGGED:
      - "64500:100"
    INTERNAL-COMMS:
      - "64500:999"

  ext-community-sets:
    RT-CUSTOMER-A:
      - "rt 65000:100"

  large-community-sets:
    LC-PEER-TAGGED:
      - "64500:100:200"

  as-path-sets:
    PRIVATE-ASN:
      - regex: "_64512_"
        action: permit

  route-policies:
    PEER-IN:
      - sequence: 10
        action: deny
        match:
          prefix-set: BOGONS-V4
      - sequence: 20
        action: deny
        match:
          community-set: BLACKHOLE
      - sequence: 30
        action: deny
        match:
          as-path-set: PRIVATE-ASN
      - sequence: 100
        action: permit
        set:
          local-preference: 150
          community: "64500:100"
          community-additive: true
          large-community: "64500:100:200"
          large-community-additive: true

    PEER-OUT:
      - sequence: 10
        action: permit
        match:
          prefix-set: OWN-PREFIXES-V4
        set:
          as-path-prepend: "64500 64500"
          community-delete: INTERNAL-COMMS

    REDIST-FILTER:
      - sequence: 10
        action: permit
        match:
          prefix-set: REDIST-ALLOWED-V4

service-groups:
    customer-a:
        vrf: CUSTOMER-A
        unnumbered: loop101
        pool: customer-a-pool
    dhcp-relay:
        ipv4-profile: relay-v4
        ipv6-profile: relay-v6
    dhcp-proxy:
        ipv4-profile: proxy-v4
        ipv6-profile: proxy-v6

subscriber-groups:
    groups:
        default:
            access-type: ipoe
            vlan-tpid: dot1q
            ipv4-profile: default
            ipv6-profile: default-v6
            vlans:
                - svlan: "100-120"
                  cvlan: any
                  interface: loop100
            bgp:
                enabled: true
                advertise-pools: true
                redistribute-connected: true
            aaa-policy: default-policy
        relay:
            access-type: ipoe
            vlan-tpid: dot1q
            ipv4-profile: relay-v4
            ipv6-profile: relay-v6
            vlans:
                - svlan: "300-320"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy
        proxy:
            access-type: ipoe
            vlan-tpid: dot1q
            ipv4-profile: proxy-v4
            ipv6-profile: proxy-v6
            vlans:
                - svlan: "400-420"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy
        pppoe:
            access-type: pppoe
            vlan-tpid: dot1q
            ipv4-profile: default
            vlans:
                - svlan: "200-220"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy

ipv4-profiles:
    default:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        pools:
            - name: subscriber-pool
              network: 10.255.0.0/16
              priority: 1
            - name: customer-a-pool
              network: 192.168.123.0/24
              range_start: 192.168.123.2
              range_end: 192.168.123.254
              gateway: 192.168.123.1
              vrf: CUSTOMER-A
              priority: 10
        dhcp:
            lease-time: 3600
    relay-v4:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        dhcp:
            mode: relay
            servers:
                - address: "172.30.0.5:67"
                  priority: 100
            giaddr: 172.30.0.2
            option82:
                circuit-id-format: "{interface}:{svlan}:{cvlan}"
                remote-id-format: "{mac}"
    proxy-v4:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        dhcp:
            mode: proxy
            servers:
                - address: "172.30.0.5:67"
                  priority: 100
            giaddr: 172.30.0.2
            client-lease: 300
            option82:
                circuit-id-format: "{interface}:{svlan}:{cvlan}"
                remote-id-format: "{mac}"

ipv6-profiles:
    default-v6:
        iana-pools:
            - name: wan-link-pool
              network: 2001:db8:0:1::/64
              range_start: 2001:db8:0:1::1000
              range_end: 2001:db8:0:1::ffff
              gateway: 2001:db8:0:1::1
              preferred_time: 3600
              valid_time: 7200
        pd-pools:
            - name: subscriber-pd-pool
              network: 2001:db8:100::/40
              prefix_length: 56
              preferred_time: 3600
              valid_time: 7200
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844
    relay-v6:
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844
        dhcpv6:
            mode: relay
            servers:
                - address: "[fd00:30::5]:547"
                  priority: 100
            link-address: "2001:db8:0:1::1"
            interface-id-format: "{interface}:{svlan}:{cvlan}"
    proxy-v6:
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844
        dhcpv6:
            mode: proxy
            servers:
                - address: "[fd00:30::5]:547"
                  priority: 100
            link-address: "2001:db8:0:1::1"
            interface-id-format: "{interface}:{svlan}:{cvlan}"
            client-preferred-lifetime: 300
            client-valid-lifetime: 600

dhcp:
    provider: local

dhcpv6:
    provider: local
    dns_servers:
        - 2001:4860:4860::8888
        - 2001:4860:4860::8844
    ra:
        router_lifetime: 1800
        max_interval: 600
        min_interval: 200
interfaces:
    eth0:
        description: Management Interface
        enabled: true
        address:
            ipv4:
                - 192.168.100.10/24
            ipv6:
                - 2001:db8:100::10/64
    loop0:
        description: Control Plane Loopback
        enabled: true
        address:
            ipv4:
                - 10.254.0.1/32
    eth1:
        description: Access Interface
        enabled: true
        bng_mode: access
    eth2:
        description: Core Link (frr-peer)
        enabled: true
        address:
            ipv4:
                - 10.0.0.1/30
            ipv6:
                - 2001:db8:c0:e::1/64
    loop100:
        description: Subscriber Gateway Loopback
        enabled: true
        address:
            ipv4:
                - 10.255.0.1/32
            ipv6:
                - 2001:db8:0:1::1/128
    loop101:
        description: CUSTOMER-A Gateway
        enabled: true
        address:
            ipv4:
                - 192.168.123.1/32
        vrf: CUSTOMER-A
protocols:
    bgp:
        asn: 65000
        router-id: 10.254.0.1
        neighbors:
            10.254.0.2:
                remote-as: 65000
                peer: loop0
        ipv4-unicast:
            redistribute:
                connected: true
        ipv4-vpn:
            neighbors:
                10.254.0.2:
                    send-community: both
        vrf:
            CUSTOMER-A:
                ipv4-unicast:
                    redistribute:
                        connected: true
                    label-vpn: auto
                    export-vpn: true
                    import-vpn: true
    ospf:
        enabled: true
        router-id: 10.254.0.1
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point
                    loop0:
                        passive: true
    ospf6:
        enabled: true
        router-id: 10.254.0.1
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point
    mpls:
        enabled: true
    ldp:
        enabled: true
        router-id: 10.254.0.1
        address-families:
            ipv4:
                transport-address: 10.254.0.1
aaa:
    auth_provider: local
    nas_identifier: osvbng
    policy:
        - name: default-policy
          format: $mac-address$
          max_concurrent_sessions: 1
plugins:
    exporter.prometheus:
        enabled: true
        listen_address: :9090
    northbound.api:
        enabled: true
        listen_address: :8080
    subscriber.auth.local:
        allow_all: true
        database_path: /tmp/osvbng.db
    subscriber.auth.radius:
        servers:
            - host: 172.30.0.4
              secret: testing123
        nas_identifier: osvbng
        nas_ip: 172.30.0.2
    subscriber.auth.http:
        endpoint: http://host.docker.internal:8081/api/v1/subscribers
        method: POST
        timeout: 30s
        # tls:
        #     insecure_skip_verify: false
        #     ca_cert_file: /etc/osvbng/ca.crt
        # auth:
        #     type: bearer
        #     token: your-api-token
        headers:
            osvbng-dev: True
        response:
            allowed_condition:
                jsonpath: status
                value: "allowed"
        accounting:
            enabled: true
            start:
                endpoint: http://host.docker.internal:8081/api/v1/subscribers/{{.AcctSessionID}}/accounting/start
            update:
                endpoint: http://host.docker.internal:8081/api/v1/subscribers/{{.AcctSessionID}}/accounting/update
            stop:
                endpoint: http://host.docker.internal:8081/api/v1/subscribers/{{.AcctSessionID}}/accounting/stop
monitoring:
  collect_interval: 30s
  disabled_collectors:
    - subscriber.sessions
    - subscriber.stats
    - protocols.bgp.statistics
    - protocols.bgp.ipv6.statistics
    - protocols.bgp.neighbors.<*:ip>
system:
    cppm:
        dataplane:
            policer:
                dhcpv4:
                    rate: 1000
                    burst: 500
                dhcpv6:
                    rate: 1000
                    burst: 500
                arp:
                    rate: 1000
                    burst: 500
                ipv6-nd:
                    rate: 500
                    burst: 200
        controlplane:
            policer:
                dhcpv4:
                    rate: 1000
                    burst: 500
                dhcpv6:
                    rate: 1000
                    burst: 500
                arp:
                    rate: 1000
                    burst: 500
                ipv6-nd:
                    rate: 500
                    burst: 200
ha:
    enabled: false
    node_id: bng-1
    peer:
        address: 172.30.0.3:50051
    heartbeat:
        interval: 1s
        timeout: 5s
    srgs:
        default:
            virtual_mac: "02:00:5e:00:01:01"
            priority: 100
            subscriber_groups:
                - default
                - pppoe
            interfaces:
                - eth1
            track_priority_decrement: 60
            networks:
                - prefix: 10.255.0.0/16
                - prefix: 2001:db8:100::/40
                - prefix: 192.168.123.0/24
                  vrf: CUSTOMER-A

logging:
    format: text
    level: info
    components:
        aaa: info
        arp: info
        dataplane: info
        ha: info
        ipoe: info
        pppoe: info
        southbound: info
        subscriber: info
dataplane:
    lcp-netns: dataplane
    main-core: 0
    statseg:
        size: "512m"
        page-size: "4k"
        per-node-counters: false
    memory:
        main-heap-size: "1G"
        main-heap-page-size: "4k"

watchdog:
  enabled: true
  check-interval: 3s
  targets:
    vpp:
      enabled: true
      timeout: 2s
      failure-threshold: 3
      on-failure: restart
      min-restart-interval: 30s
      reconnect-backoff: 2s
      reconnect-max-backoff: 30s
      critical: true
    frr:
      enabled: true
      timeout: 2s
      failure-threshold: 3
      on-failure: warn
      critical: false