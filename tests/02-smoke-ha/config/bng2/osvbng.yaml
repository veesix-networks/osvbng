vrfs:
  cgnat:
    address-families:
      ipv4-unicast: {}
      ipv6-unicast: {}
  CUSTOMER-A:
    description: "Test L3VPN customer"
    rd: "65000:100"
    import-route-targets:
      - "65000:100"
    export-route-targets:
      - "65000:100"
    address-families:
      ipv4-unicast: {}
      ipv6-unicast: {}

service-groups:
    customer-a:
        vrf: CUSTOMER-A
        unnumbered: loop101
        pool: customer-a-pool

subscriber-groups:
    groups:
        default:
            access-type: ipoe
            vlan-tpid: dot1q
            ipv4-profile: default
            ipv6-profile: default-v6
            vlans:
                - svlan: "100-110"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy
        pppoe:
            access-type: pppoe
            vlan-tpid: dot1q
            ipv4-profile: default
            vlans:
                - svlan: "200-210"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy

ipv4-profiles:
    default:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        pools:
            - name: subscriber-pool
              network: 10.255.0.0/16
              priority: 1
            - name: customer-a-pool
              network: 192.168.123.0/24
              range_start: 192.168.123.2
              range_end: 192.168.123.254
              gateway: 192.168.123.1
              vrf: CUSTOMER-A
              priority: 10
        dhcp:
            lease-time: 3600

ipv6-profiles:
    default-v6:
        iana-pools:
            - name: wan-link-pool
              network: 2001:db8:0:1::/64
              range_start: 2001:db8:0:1::1000
              range_end: 2001:db8:0:1::ffff
              gateway: 2001:db8:0:1::1
              preferred_time: 3600
              valid_time: 7200
        pd-pools:
            - name: subscriber-pd-pool
              network: 2001:db8:100::/40
              prefix_length: 56
              preferred_time: 3600
              valid_time: 7200
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844

dhcp:
    provider: local

dhcpv6:
    provider: local

interfaces:
    loop0:
        description: Control Plane Loopback
        enabled: true
        address:
            ipv4:
                - 10.254.0.3/32
    eth1:
        description: Access Interface
        enabled: true
        bng_mode: access
    eth2:
        description: Core Link (corerouter1)
        enabled: true
        address:
            ipv4:
                - 10.0.1.1/30
            ipv6:
                - 2001:db8:c0:f::1/64
    loop100:
        description: Subscriber Gateway Loopback
        enabled: true
        address:
            ipv4:
                - 10.255.0.1/32
            ipv6:
                - 2001:db8:0:1::1/128
    loop101:
        description: CUSTOMER-A Gateway
        enabled: true
        address:
            ipv4:
                - 192.168.123.1/32
        vrf: CUSTOMER-A

protocols:
    bgp:
        asn: 65000
        router-id: 10.254.0.3
        neighbors:
            10.254.0.2:
                remote-as: 65000
                peer: loop0
        ipv4-unicast:
            redistribute:
                connected: true
        ipv4-vpn:
            neighbors:
                10.254.0.2:
                    send-community: both
        vrf:
            CUSTOMER-A:
                ipv4-unicast:
                    redistribute:
                        connected: true
                    label-vpn: auto
                    export-vpn: true
                    import-vpn: true
    ospf:
        enabled: true
        router-id: 10.254.0.3
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point
                    loop0:
                        passive: true
    ospf6:
        enabled: true
        router-id: 10.254.0.3
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point
    mpls:
        enabled: true
    ldp:
        enabled: true
        router-id: 10.254.0.3
        address-families:
            ipv4:
                transport-address: 10.254.0.3

aaa:
    auth_provider: local
    nas_identifier: osvbng-2
    policy:
        - name: default-policy
          format: $mac-address$
          max_concurrent_sessions: 1

plugins:
    exporter.prometheus:
        enabled: true
        listen_address: :9090
    northbound.api:
        enabled: true
        listen_address: :8080
    subscriber.auth.local:
        allow_all: true
        database_path: /tmp/osvbng.db

monitoring:
  collect_interval: 30s

logging:
    format: text
    level: info
    components:
        ha: debug

dataplane:
    lcp-netns: dataplane
    statseg:
        size: "512m"
        page-size: "4k"
        per-node-counters: false

ha:
    enabled: true
    node_id: bng-2
    peer:
        address: clab-osvbng-smoke-ha-bng1:50051
    heartbeat:
        interval: 1s
        timeout: 5s
    srgs:
        default:
            virtual_mac: "02:00:5e:00:01:01"
            priority: 50
            preempt: true
            subscriber_groups:
                - default
                - pppoe
            interfaces:
                - eth1
            networks:
                - prefix: 10.255.0.0/16
                - prefix: 2001:db8:100::/40
                - prefix: 192.168.123.0/24
                  vrf: CUSTOMER-A
