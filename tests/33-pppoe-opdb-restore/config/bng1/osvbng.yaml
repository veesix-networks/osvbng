subscriber-groups:
    groups:
        pppoe:
            vlan-tpid: dot1q
            ipv4-profile: default
            ipv6-profile: default-v6
            vlans:
                - svlan: "200-210"
                  cvlan: any
                  interface: loop100
                  parent-interface: eth1
                  access-types: [pppoe]
            aaa-policy: pppoe-policy

ipv4-profiles:
    default:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        pools:
            - name: subscriber-pool
              network: 10.255.0.0/16
              priority: 1
        dhcp:
            lease-time: 3600

ipv6-profiles:
    default-v6:
        iana-pools:
            - name: wan-link-pool
              network: 2001:db8:0:1::/64
              range_start: 2001:db8:0:1::1000
              range_end: 2001:db8:0:1::ffff
              gateway: 2001:db8:0:1::1
              preferred_time: 3600
              valid_time: 7200
        pd-pools:
            - name: subscriber-pd-pool
              network: 2001:db8:100::/40
              prefix_length: 56
              preferred_time: 3600
              valid_time: 7200
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844

dhcp:
    provider: local

dhcpv6:
    provider: local
    dns_servers:
        - 2001:4860:4860::8888
        - 2001:4860:4860::8844
    ra:
        router_lifetime: 1800
        max_interval: 600
        min_interval: 200

interfaces:
    loop0:
        description: Control Plane Loopback
        enabled: true
        address:
            ipv4:
                - 10.254.0.1/32
    eth1:
        description: Access Interface
        enabled: true
    eth2:
        description: Core Link (corerouter1)
        enabled: true
        address:
            ipv4:
                - 10.0.0.1/30
            ipv6:
                - 2001:db8:c0:e::1/64
    loop100:
        description: Subscriber Gateway Loopback
        enabled: true
        address:
            ipv4:
                - 10.255.0.1/32
            ipv6:
                - 2001:db8:0:1::1/128

protocols:
    ospf:
        enabled: true
        router-id: 10.254.0.1
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point
                    loop0:
                        passive: true
    ospf6:
        enabled: true
        router-id: 10.254.0.1
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point

aaa:
    auth_provider: local
    nas_identifier: osvbng
    policy:
        - name: pppoe-policy
          type: ppp
          format: $username$
          authenticate: true
          max_concurrent_sessions: 1

plugins:
    exporter.prometheus:
        enabled: true
        listen_address: :9090
    northbound.api:
        enabled: true
        listen_address: :8080
    subscriber.auth.local:
        allow_all: true
        database_path: /tmp/osvbng.db

monitoring:
  collect_interval: 30s

logging:
    format: text
    level: info
    components:
        aaa: debug
        dataplane: debug
        pppoe: debug

dataplane:
    lcp-netns: dataplane
    statseg:
        size: "512m"
        page-size: "4k"
        per-node-counters: false

watchdog:
    enabled: true
    check-interval: 5s
    targets:
        vpp:
            enabled: true
            timeout: 3s
            failure-threshold: 3
            on-failure: restart
            min-restart-interval: 5s
            fail-exit-code: 1
            critical: true
        frr:
            enabled: true
            on-failure: warn
