frr version 10
frr defaults traditional
hostname corerouter1
log syslog informational
service integrated-vtysh-config
no ipv6 forwarding
!
interface eth1
 ip address 10.0.0.2/30
exit
!
interface lo
 ip address 10.254.0.2/32
exit
!
ip prefix-list ANNOUNCE-ALLOWED seq 10 permit 192.0.2.0/24
ip prefix-list ANNOUNCE-ALLOWED seq 20 permit 198.51.100.0/24
ip prefix-list ANNOUNCE-BOGONS seq 10 permit 10.0.0.0/8
ip prefix-list ANNOUNCE-BOGONS seq 20 permit 172.16.0.0/12
ip prefix-list ANNOUNCE-BLACKHOLE seq 10 permit 203.0.113.1/32
ip prefix-list ANNOUNCE-PRIV-AS seq 10 permit 198.18.0.0/15
ip prefix-list ANNOUNCE-ALL seq 10 permit 0.0.0.0/0 le 32
!
route-map PERMIT-ALL permit 10
!
! Route-map to tag the blackhole prefix with community 64500:666
route-map TAG-BLACKHOLE permit 10
 match ip address prefix-list ANNOUNCE-BLACKHOLE
 set community 64500:666
!
route-map TAG-BLACKHOLE permit 1000
!
! Route-map to inject a private ASN into the path
route-map PREPEND-PRIVATE-AS permit 10
 match ip address prefix-list ANNOUNCE-PRIV-AS
 set as-path prepend 64512
!
route-map PREPEND-PRIVATE-AS permit 1000
!
router bgp 64501
 bgp router-id 10.254.0.2
 neighbor 10.0.0.1 remote-as 64500
 !
 address-family ipv4 unicast
  neighbor 10.0.0.1 route-map PERMIT-ALL in
  neighbor 10.0.0.1 route-map TAG-BLACKHOLE out
  ! Advertise allowed prefixes (static null routes)
  network 192.0.2.0/24
  network 198.51.100.0/24
  ! Advertise bogon prefixes (to test rejection)
  network 10.0.0.0/8
  network 172.16.0.0/12
  ! Advertise blackhole prefix (tagged via route-map)
  network 203.0.113.1/32
  ! Advertise prefix that will get private ASN prepended
  network 198.18.0.0/15 route-map PREPEND-PRIVATE-AS
 exit-address-family
exit
!
! Static null routes so BGP can originate them
ip route 192.0.2.0/24 Null0
ip route 198.51.100.0/24 Null0
ip route 10.0.0.0/8 Null0
ip route 172.16.0.0/12 Null0
ip route 203.0.113.1/32 Null0
ip route 198.18.0.0/15 Null0
!
line vty
!
