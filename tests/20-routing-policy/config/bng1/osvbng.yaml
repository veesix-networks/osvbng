routing-policies:
  prefix-sets:
    BOGONS-V4:
      - prefix: "10.0.0.0/8"
        action: permit
      - prefix: "172.16.0.0/12"
        action: permit
    OWN-PREFIXES-V4:
      - prefix: "203.0.113.0/24"
        action: permit
    REDIST-ALLOWED-V4:
      - prefix: "203.0.113.0/24"
        le: 24
        action: permit

  community-sets:
    BLACKHOLE:
      - "64500:666"
    PEER-TAGGED:
      - "64500:100"
    INTERNAL-COMMS:
      - "64500:999"

  large-community-sets:
    LC-PEER-TAGGED:
      - "64500:100:200"

  as-path-sets:
    PRIVATE-ASN:
      - regex: "_64512_"
        action: permit

  route-policies:
    PEER-IN:
      - sequence: 10
        action: deny
        match:
          prefix-set: BOGONS-V4
      - sequence: 20
        action: deny
        match:
          community-set: BLACKHOLE
      - sequence: 30
        action: deny
        match:
          as-path-set: PRIVATE-ASN
      - sequence: 100
        action: permit
        set:
          local-preference: 150
          community: "64500:100"
          community-additive: true
          large-community: "64500:100:200"
          large-community-additive: true

    PEER-OUT:
      - sequence: 10
        action: permit
        match:
          prefix-set: OWN-PREFIXES-V4
        set:
          as-path-prepend: "64500 64500"
          community-delete: INTERNAL-COMMS

    REDIST-FILTER:
      - sequence: 10
        action: permit
        match:
          prefix-set: REDIST-ALLOWED-V4

interfaces:
    loop0:
        description: Control Plane Loopback
        enabled: true
        address:
            ipv4:
                - 10.254.0.1/32
    eth1:
        description: Access Interface
        enabled: true
        bng_mode: access
    eth2:
        description: Core Link
        enabled: true
        address:
            ipv4:
                - 10.0.0.1/30
    loop100:
        description: Subscriber Gateway
        enabled: true
        address:
            ipv4:
                - 192.0.2.1/32

subscriber-groups:
    groups:
        default:
            access-type: ipoe
            vlan-tpid: dot1q
            ipv4-profile: default
            vlans:
                - svlan: "100-110"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy

ipv4-profiles:
    default:
        gateway: 192.0.2.1
        dns:
            - 8.8.8.8
        pools:
            - name: subscriber-pool
              network: 192.0.2.0/24
              range_start: 192.0.2.10
              range_end: 192.0.2.250
              priority: 1
        dhcp:
            lease-time: 3600

dhcp:
    provider: local

protocols:
    static:
        ipv4:
            - destination: "203.0.113.0/24"
              device: Null0
    bgp:
        asn: 64500
        router-id: 10.254.0.1
        neighbors:
            10.0.0.2:
                remote-as: 64501
                ipv4-unicast:
                    route-policy-in: PEER-IN
                    route-policy-out: PEER-OUT
        ipv4-unicast:
            networks:
                203.0.113.0/24: {}
            redistribute:
                connected: true
                route-policy: REDIST-FILTER

aaa:
    auth_provider: local
    policy:
        - name: default-policy
          format: $mac-address$
          max_concurrent_sessions: 1

plugins:
    northbound.api:
        enabled: true
        listen_address: :8080
    subscriber.auth.local:
        allow_all: true
        database_path: /tmp/osvbng.db

logging:
    format: text
    level: info
    components:
        routing: debug

dataplane:
    lcp-netns: dataplane
    statseg:
        size: "512m"
        page-size: "4k"
        per-node-counters: false
