frr version 10
frr defaults traditional
hostname corerouter1
log syslog informational
service integrated-vtysh-config
!
vrf CUSTOMER-A
 exit-vrf
!
interface dummy-default
 ip address 10.200.0.1/32
exit
!
interface dummy-custa vrf CUSTOMER-A
 ip address 192.168.200.1/32
exit
!
interface eth1.100
 ip address 10.0.100.2/30
exit
!
interface eth1.200 vrf CUSTOMER-A
 ip address 10.0.200.2/30
exit
!
interface lo
 ip address 10.254.0.2/32
exit
!
router bgp 65000
 bgp router-id 10.254.0.2
 no bgp default ipv4-unicast
 neighbor 10.0.100.1 remote-as 65000
 !
 address-family ipv4 unicast
  neighbor 10.0.100.1 activate
  redistribute connected
 exit-address-family
exit
!
router bgp 65000 vrf CUSTOMER-A
 neighbor 10.0.200.1 remote-as 65000
 !
 address-family ipv4 unicast
  neighbor 10.0.200.1 activate
  redistribute connected
 exit-address-family
exit
!
line vty
!
