subscriber-groups:
    groups:
        default:
            access-type: ipoe
            vlan-tpid: dot1q
            ipv4-profile: default
            ipv6-profile: default-v6
            vlans:
                - svlan: "100-110"
                  cvlan: any
                  interface: loop100
            aaa-policy: default-policy

ipv4-profiles:
    default:
        gateway: 10.255.0.1
        dns:
            - 8.8.8.8
            - 8.8.4.4
        pools:
            - name: subscriber-pool
              network: 10.255.0.0/16
              priority: 1
        dhcp:
            lease-time: 3600

ipv6-profiles:
    default-v6:
        iana-pools:
            - name: wan-link-pool
              network: 2001:db8:0:1::/64
              range_start: 2001:db8:0:1::1000
              range_end: 2001:db8:0:1::ffff
              gateway: 2001:db8:0:1::1
              preferred_time: 3600
              valid_time: 7200
        pd-pools:
            - name: subscriber-pd-pool
              network: 2001:db8:100::/40
              prefix_length: 56
              preferred_time: 3600
              valid_time: 7200
        dns:
            - 2001:4860:4860::8888
            - 2001:4860:4860::8844

dhcp:
    provider: local

dhcpv6:
    provider: local
    dns_servers:
        - 2001:4860:4860::8888
        - 2001:4860:4860::8844
    ra:
        router_lifetime: 1800
        max_interval: 600
        min_interval: 200

interfaces:
    loop0:
        description: Control Plane Loopback
        enabled: true
        address:
            ipv4:
                - 10.254.0.1/32
    eth1:
        description: Access Interface
        enabled: true
        bng_mode: access
    eth2:
        description: Core Link
        enabled: true
        bng_mode: core
        address:
            ipv4:
                - 10.0.0.1/30
    loop100:
        description: Subscriber Gateway Loopback
        enabled: true
        address:
            ipv4:
                - 10.255.0.1/32
            ipv6:
                - 2001:db8:0:1::1/128

protocols:
    ospf:
        enabled: true
        router-id: 10.254.0.1
        log-adjacency-changes: true
        areas:
            "0.0.0.0":
                interfaces:
                    eth2:
                        network: point-to-point
                    loop0:
                        passive: true
                    loop100:
                        passive: true

aaa:
    auth_provider: local
    nas_identifier: osvbng
    policy:
        - name: default-policy
          format: $mac-address$
          max_concurrent_sessions: 1

plugins:
    northbound.api:
        enabled: true
        listen_address: :8080
    subscriber.auth.local:
        allow_all: true
        database_path: /tmp/osvbng.db

logging:
    format: text
    level: info

dataplane:
    lcp-netns: dataplane
