name: osvbng-ipoe-linux-client

topology:
  nodes:
    bng1:
      kind: linux
      image: veesixnetworks/osvbng:local
      image-pull-policy: Never
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
        - IPC_LOCK
        - SYS_NICE
      env:
        OSVBNG_WAIT_FOR_INTERFACES: "true"
        OSVBNG_NUM_INTERFACES: "3"
      binds:
        - config/bng1/osvbng.yaml:/etc/osvbng/osvbng.yaml:ro

    corerouter1:
      kind: linux
      image: frrouting/frr:v8.4.1
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
      binds:
        - config/corerouter1/daemons:/etc/frr/daemons:ro
        - config/corerouter1/frr.conf:/etc/frr/frr.conf:ro
        - config/corerouter1/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh

    subscriber:
      kind: linux
      image: ${BNGTESTER_IMAGE:-veesixnetworks/bngtester:alpine-latest}
      cap-add:
        - NET_ADMIN
      env:
        ACCESS_METHOD: dhcpv4
        ENCAP: qinq
        PHYSICAL_IFACE: eth1
        SVLAN: "100"
        CVLAN: "10"
        MGMT_IFACE: eth0

  links:
    - endpoints: [bng1:eth1, subscriber:eth1]
    - endpoints: [bng1:eth2, corerouter1:eth1]
