name: osvbng-ipoe-radius

mgmt:
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:
    bng1:
      kind: linux
      image: veesixnetworks/osvbng:local
      image-pull-policy: Never
      mgmt-ipv4: 172.20.20.2
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
        - IPC_LOCK
        - SYS_NICE
      env:
        OSVBNG_WAIT_FOR_INTERFACES: "true"
        OSVBNG_NUM_INTERFACES: "3"
      binds:
        - config/bng1/osvbng.yaml:/etc/osvbng/osvbng.yaml:ro

    corerouter1:
      kind: linux
      image: frrouting/frr:v8.4.1
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
      binds:
        - config/corerouter1/daemons:/etc/frr/daemons:ro
        - config/corerouter1/frr.conf:/etc/frr/frr.conf:ro
        - config/corerouter1/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh

    subscribers:
      kind: linux
      image: veesixnetworks/bngblaster:0.9.30
      binds:
        - config/subscribers/config-ipoe.json:/config/config.json:ro

    freeradius:
      kind: linux
      image: freeradius/freeradius-server:3.2.7
      mgmt-ipv4: 172.20.20.10
      binds:
        - config/freeradius/clients.conf:/etc/freeradius/clients.conf:ro
        - config/freeradius/authorize:/etc/freeradius/mods-config/files/authorize:ro
      exec:
        - bash -c "freeradius -X &"

  links:
    - endpoints: [bng1:eth1, subscribers:eth1]
    - endpoints: [bng1:eth2, corerouter1:eth1]
