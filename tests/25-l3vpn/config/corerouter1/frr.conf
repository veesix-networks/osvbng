frr version 10
frr defaults traditional
hostname corerouter1
log syslog informational
service integrated-vtysh-config
!
vrf CUSTOMER-A
 exit-vrf
!
interface dummy-default
 ip address 10.200.0.1/32
exit
!
interface dummy-custa vrf CUSTOMER-A
 ip address 192.168.200.1/32
exit
!
interface eth1
 ip address 10.0.1.2/30
 mpls enable
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface lo
 ip address 10.254.0.2/32
 ip ospf area 0.0.0.0
 ip ospf passive
exit
!
router bgp 65000
 bgp router-id 10.254.0.2
 no bgp default ipv4-unicast
 neighbor 10.254.0.1 remote-as internal
 neighbor 10.254.0.1 update-source lo
 !
 address-family ipv4 vpn
  neighbor 10.254.0.1 activate
  neighbor 10.254.0.1 send-community both
 exit-address-family
exit
!
router bgp 65000 vrf CUSTOMER-A
 !
 address-family ipv4 unicast
  redistribute connected
  rd vpn export 65000:100
  rt vpn import 65000:100
  rt vpn export 65000:100
  label vpn export auto
  export vpn
  import vpn
 exit-address-family
exit
!
router ospf
 ospf router-id 10.254.0.2
 log-adjacency-changes
exit
!
mpls ldp
 router-id 10.254.0.2
 !
 address-family ipv4
  discovery transport-address 10.254.0.2
  !
  interface eth1
  exit
  !
 exit-address-family
 !
exit
!
line vty
!
