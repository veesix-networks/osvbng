frr version 10
frr defaults traditional
hostname p1
log syslog informational
service integrated-vtysh-config
!
interface eth1
 ip address 10.0.0.2/30
 mpls enable
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.0.1.1/30
 mpls enable
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface lo
 ip address 10.254.0.3/32
 ip ospf area 0.0.0.0
 ip ospf passive
exit
!
router ospf
 ospf router-id 10.254.0.3
 log-adjacency-changes
exit
!
mpls ldp
 router-id 10.254.0.3
 !
 address-family ipv4
  discovery transport-address 10.254.0.3
  !
  interface eth1
  exit
  !
  interface eth2
  exit
  !
 exit-address-family
 !
exit
!
line vty
!
