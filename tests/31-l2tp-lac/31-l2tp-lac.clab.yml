name: osvbng-l2tp-lac

topology:
  nodes:
    bng1:
      kind: linux
      image: veesixnetworks/osvbng:local
      image-pull-policy: Never
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
        - IPC_LOCK
        - SYS_NICE
      env:
        OSVBNG_WAIT_FOR_INTERFACES: "true"
        OSVBNG_NUM_INTERFACES: "3"
      binds:
        - config/bng1/osvbng.yaml:/etc/osvbng/osvbng.yaml:ro

    corerouter1:
      kind: linux
      image: frrouting/frr:v8.4.1
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
      binds:
        - config/corerouter1/daemons:/etc/frr/daemons:ro
        - config/corerouter1/frr.conf:/etc/frr/frr.conf:ro
        - config/corerouter1/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh

    subscribers:
      kind: linux
      image: veesixnetworks/bngblaster:0.9.30
      binds:
        - config/subscribers/config-l2tp-lac.json:/config/config.json:ro

  links:
    # PPPoE subscriber traffic (L2)
    - endpoints: [bng1:eth1, subscribers:eth1]
    # L2TP backbone (L3) — osvbng-LAC ↔ bngblaster-LNS
    - endpoints: [bng1:eth2, subscribers:eth2]
    # Optional FRR core for routing context
    - endpoints: [bng1:eth3, corerouter1:eth1]
