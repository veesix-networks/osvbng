name: osvbng-ipoe-opdb-restore

topology:
  nodes:
    bng1:
      kind: linux
      image: veesixnetworks/osvbng:local
      image-pull-policy: Never
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
        - IPC_LOCK
        - SYS_NICE
      env:
        OSVBNG_WAIT_FOR_INTERFACES: "true"
        OSVBNG_NUM_INTERFACES: "3"
        OSVBNG_RESPAWN: "true"
      binds:
        - config/bng1/osvbng.yaml:/etc/osvbng/osvbng.yaml:ro

    corerouter1:
      kind: linux
      image: frrouting/frr:v8.4.1
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
      binds:
        - config/corerouter1/daemons:/etc/frr/daemons:ro
        - config/corerouter1/frr.conf:/etc/frr/frr.conf:ro
        - config/corerouter1/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh

    subscribers:
      kind: linux
      image: ${BNGTESTER_IMAGE:-veesixnetworks/bngtester:debian-latest}
      cap-add:
        - NET_ADMIN
      env:
        PHYSICAL_IFACE: eth1
        SVLAN: "100"
        MGMT_IFACE: eth0
      entrypoint: /entrypoint.sh
      binds:
        - config/subscribers/entrypoint.sh:/entrypoint.sh:ro
        - config/subscribers/dhclient.conf:/etc/dhcp/dhclient.conf:ro

  links:
    - endpoints: [bng1:eth1, subscribers:eth1]
      mtu: 1500
    - endpoints: [bng1:eth2, corerouter1:eth1]
      mtu: 1500
