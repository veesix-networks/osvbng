frr version 10
frr defaults traditional
hostname corerouter1
log syslog informational
service integrated-vtysh-config
no ipv6 forwarding
!
interface eth1
 ip address 10.10.0.1/30
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.20.0.1/30
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface lo
 ip address 10.254.0.2/32
 ip ospf area 0.0.0.0
 ip ospf passive
exit
!
router ospf
 ospf router-id 10.254.0.2
 log-adjacency-changes
 redistribute connected
 redistribute static
exit
!
ip route 100.64.0.0/16 10.20.0.2
!
ip forwarding
!
end
