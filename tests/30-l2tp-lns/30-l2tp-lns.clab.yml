name: osvbng-l2tp-lns

topology:
  nodes:
    bng1:
      kind: linux
      image: veesixnetworks/osvbng:local
      image-pull-policy: Never
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
        - IPC_LOCK
        - SYS_NICE
      env:
        OSVBNG_WAIT_FOR_INTERFACES: "true"
        OSVBNG_NUM_INTERFACES: "1"
      binds:
        - config/bng1/osvbng.yaml:/etc/osvbng/osvbng.yaml:ro

    corerouter1:
      kind: linux
      image: frrouting/frr:v8.4.1
      cap-add:
        - SYS_ADMIN
        - NET_ADMIN
      binds:
        - config/corerouter1/daemons:/etc/frr/daemons:ro
        - config/corerouter1/frr.conf:/etc/frr/frr.conf:ro
        - config/corerouter1/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh

    lac:
      kind: linux
      image: veesixnetworks/xl2tpd:local
      image-pull-policy: Never
      cap-add:
        - NET_ADMIN
        - NET_RAW
        - SYS_ADMIN
      binds:
        - config/lac/xl2tpd.conf:/etc/xl2tpd/xl2tpd.conf:ro
        - config/lac/l2tp-secrets:/etc/xl2tpd/l2tp-secrets:ro
        - config/lac/options.xl2tpd:/etc/ppp/options.xl2tpd:ro
        - config/lac/chap-secrets:/etc/ppp/chap-secrets:ro

  links:
    - endpoints: [lac:eth1, corerouter1:eth1]
      mtu: 1500
    - endpoints: [corerouter1:eth2, bng1:eth1]
      mtu: 1500
