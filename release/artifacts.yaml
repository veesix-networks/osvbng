# Canonical artifact source-of-truth for Tier A v2 upgrade tarballs and
# packer first-boot installs. The builder reads this file at release
# time to produce the on-the-wire manifest; packer reads the same set
# (via the same builder, see scripts/qemu/packer/) at image-build time.
#
# Adding a new artifact: append an entry here, run `make tarball-smoke`
# locally to confirm the builder picks it up, open a PR. Globbing
# source directories is intentionally NOT supported — a stray .so under
# test-infra/vpp-plugins/ must not silently ship.
schema_version: 1
artifacts:
  - source: bin/osvbngd
    install_path: /usr/local/bin/osvbngd
    mode: "0755"
    uid: 0
    gid: 0
    requires_restart: osvbngd

  - source: bin/osvbngcli
    install_path: /usr/local/bin/osvbngcli
    mode: "0755"
    uid: 0
    gid: 0
    requires_restart: none

  - source: test-infra/vpp-plugins/osvbng_cgnat_plugin.so
