name: ipoe-local-tests

on:
  workflow_call:

jobs:
  ipoe-local:
    name: IPoE Local Auth Tests
    runs-on: self-hosted
    concurrency:
      group: integration-tests
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: make docker-local

      - name: Run IPoE local auth tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/03-ipoe-local-log.html --report NONE tests/03-ipoe-local/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipoe-local-test-results
          path: test-results/
          retention-days: 14
