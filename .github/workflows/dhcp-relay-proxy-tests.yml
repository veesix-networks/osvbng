name: dhcp-relay-proxy-tests

on:
  workflow_call:

jobs:
  dhcp-relay-proxy:
    name: DHCP Relay/Proxy Tests
    runs-on: self-hosted
    concurrency:
      group: integration-tests
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          make docker-local
          make docker-kea-local

      - name: Run DHCP relay/proxy tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/07-dhcp-relay-proxy-log.html --report NONE tests/07-dhcp-relay-proxy/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dhcp-relay-proxy-test-results
          path: test-results/
          retention-days: 14
