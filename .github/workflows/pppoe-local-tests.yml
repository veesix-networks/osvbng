name: pppoe-local-tests

on:
  workflow_call:

jobs:
  pppoe-local:
    name: PPPoE Local Auth Tests
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-setup
        with:
          topology: tests/04-pppoe-local/04-pppoe-local.clab.yml

      - name: Run PPPoE local auth tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/04-pppoe-local-log.html --report NONE tests/04-pppoe-local/

      - uses: ./.github/actions/test-cleanup
        if: always()
        with:
          topology: tests/04-pppoe-local/04-pppoe-local.clab.yml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pppoe-local-test-results
          path: test-results/
          retention-days: 14
