          robot --loglevel DEBUG --output test-results/output.xml --log test-results/15-ha-failover-pppoe-log.html --report NONE tests/15-ha-failover-pppoe/

      - uses: ./.github/actions/test-cleanup
        if: always()
        with:
          topology: tests/15-ha-failover-pppoe/15-ha-failover-pppoe.clab.yml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ha-failover-pppoe-test-results
          path: test-results/
          retention-days: 14

  ha-failover-radius-ipoe:
