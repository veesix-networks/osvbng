name: ha-failover-tests

on:
  workflow_call:

jobs:
  ha-failover-ipoe:
    name: HA Failover IPoE
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-setup
        with:
          topology: tests/14-ha-failover-ipoe/14-ha-failover-ipoe.clab.yml

      - name: Run HA Failover IPoE tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/14-ha-failover-ipoe-log.html --report NONE tests/14-ha-failover-ipoe/

      - uses: ./.github/actions/test-cleanup
        if: always()
        with:
          topology: tests/14-ha-failover-ipoe/14-ha-failover-ipoe.clab.yml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ha-failover-ipoe-test-results
          path: test-results/
          retention-days: 14

  ha-failover-pppoe:
    name: HA Failover PPPoE
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
