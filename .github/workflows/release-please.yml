name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord of changelog update
        if: ${{ steps.release.outputs.pr }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_NUM: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -n \
            '{
              embeds: [{
                title: ("Release PR #" + env.PR_NUM + " updated"),
                url: ("https://github.com/" + env.REPO + "/pull/" + env.PR_NUM),
                description: ("**" + env.COMMIT_MSG + "**"),
                color: 5025616
              }]
            }')

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: Announce release to Discord
        if: ${{ steps.release.outputs.release_created }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ steps.release.outputs.tag_name }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
        run: |
          PAYLOAD=$(jq -n \
            '{
              content: ("# osvbng " + env.RELEASE_VERSION + " released!"),
              embeds: [{
                title: ("Changelog - " + env.RELEASE_VERSION),
                description: (env.RELEASE_BODY | if length > 4096 then .[0:4093] + "..." else . end),
                color: 5025616
              }]
            }')

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
