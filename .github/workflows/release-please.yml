name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord of changelog update
        if: ${{ steps.release.outputs.pr }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_NUM: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PR_URL="https://github.com/${REPO}/pull/${PR_NUM}"

          PAYLOAD=$(jq -n \
            --arg content "**${COMMIT_MSG}**" \
            --arg title "Release PR #${PR_NUM} updated" \
            --arg url "$PR_URL" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $content,
                color: 5025616
              }]
            }')

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: Announce release to Discord
        if: ${{ steps.release.outputs.release_created }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ steps.release.outputs.tag_name }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
        run: |
          PAYLOAD=$(jq -n \
            --arg content "# osvbng ${RELEASE_VERSION} released!" \
            --arg title "Changelog - ${RELEASE_VERSION}" \
            --arg description "${RELEASE_BODY}" \
            '{
              content: $content,
              embeds: [{
                title: $title,
                description: ($description | if length > 4096 then .[0:4093] + "..." else . end),
                color: 5025616
              }]
            }')

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
