name: cgnat-tests

on:
  workflow_call:

jobs:
  cgnat-ipoe-pba:
    name: CGNAT IPoE PBA
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: osvbng-image
          path: /tmp

      - uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils sshpass
          sudo chmod 666 /dev/kvm || true

      - name: Run CGNAT IPoE PBA tests
        run: |
          scripts/qemu/test-runner/scripts/vm-run-tests.sh \
            /tmp/test-runner.qcow2 \
            /tmp/osvbng-local.tar \
            08-cgnat-ipoe-pba \
            ./test-results

      - name: Test report
        if: ${{ !cancelled() }}
        uses: joonvena/robotframework-reporter-action@v2.5
        with:
          gh_access_token: ${{ secrets.GITHUB_TOKEN }}
          report_path: test-results/out
          only_summary: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cgnat-ipoe-pba-test-results
          path: test-results/
          retention-days: 14

