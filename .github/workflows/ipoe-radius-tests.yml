name: ipoe-radius-tests

on:
  workflow_call:

jobs:
  ipoe-radius:
    name: IPoE RADIUS Tests
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-setup
        with:
          topology: tests/05-ipoe-radius/05-ipoe-radius.clab.yml

      - name: Run IPoE RADIUS tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/05-ipoe-radius-log.html --report NONE tests/05-ipoe-radius/

      - uses: ./.github/actions/test-cleanup
        if: always()
        with:
          topology: tests/05-ipoe-radius/05-ipoe-radius.clab.yml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipoe-radius-test-results
          path: test-results/
          retention-days: 14
