name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  file-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      ha: ${{ steps.filter.outputs.ha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'docker/**'
              - 'api/proto/**'
              - 'templates/**'
              - 'tests/**'
              - '.github/workflows/**'
            ha:
              - 'pkg/ha/**'
              - 'api/proto/ha/**'
              - 'tests/02-smoke-ha/**'

  build:
    runs-on: ubuntu-latest
    needs: file-changes
    if: needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load versions
        id: versions
        run: |
          source versions.env
          echo "golang_version=${GOLANG_VERSION}" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.versions.outputs.golang_version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: make build

      - name: Build Docker image
        run: make docker-local

      - name: Save Docker image
        run: docker save veesixnetworks/osvbng:local -o /tmp/osvbng-local.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: osvbng-image
          path: /tmp/osvbng-local.tar
          retention-days: 1

  smoke-tests:
    uses: ./.github/workflows/smoke-tests.yml
    needs: [file-changes, build]
    if: needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'

  smoke-ha-tests:
    uses: ./.github/workflows/smoke-ha-tests.yml
    needs: [file-changes, build]
    if: needs.file-changes.outputs.ha == 'true' || needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
