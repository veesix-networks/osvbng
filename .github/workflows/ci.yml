name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  file-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      ha: ${{ steps.filter.outputs.ha }}
      sessions: ${{ steps.filter.outputs.sessions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'docker/**'
              - 'api/proto/**'
              - 'templates/**'
              - 'tests/**'
              - '.github/workflows/**'
            ha:
              - 'pkg/ha/**'
              - 'api/proto/ha/**'
              - 'tests/02-smoke-ha/**'
            sessions:
              - 'internal/ipoe/**'
              - 'internal/pppoe/**'
              - 'pkg/config/aaa/**'
              - 'pkg/dhcp/**'
              - 'plugins/auth/**'
              - 'tests/03-ipoe-local/**'
              - 'tests/04-pppoe-local/**'
              - 'tests/sessions.robot'
              - 'tests/localauth.robot'
              - 'tests/bngblaster.robot'

  build:
    runs-on: ubuntu-latest
    needs: file-changes
    if: needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load versions
        id: versions
        run: |
          source versions.env
          echo "golang_version=${GOLANG_VERSION}" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.versions.outputs.golang_version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: make build

      - name: Build Docker image
        run: make docker-local

      - name: Save Docker image
        run: docker save veesixnetworks/osvbng:local -o /tmp/osvbng-local.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: osvbng-image
          path: /tmp/osvbng-local.tar
          retention-days: 1

  prepare-test-runner:
    name: Prepare Test Runner
    runs-on: ubuntu-latest
    needs: [file-changes, build]
    if: needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        id: versions
        run: |
          source versions.env
          echo "test_runner_version=${TEST_RUNNER_VERSION}" >> $GITHUB_OUTPUT

      - name: Cache test runner image
        id: cache-test-runner
        uses: actions/cache@v4
        with:
          path: /tmp/test-runner.qcow2
          key: test-runner-${{ steps.versions.outputs.test_runner_version }}

      - name: Download test runner image
        if: steps.cache-test-runner.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.versions.outputs.test_runner_version }}" \
            --pattern "test-runner.qcow2.gz" \
            --output /tmp/test-runner.qcow2.gz
          gunzip /tmp/test-runner.qcow2.gz

      - name: Upload test runner image
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-image
          path: /tmp/test-runner.qcow2
          retention-days: 1

  smoke-tests:
    uses: ./.github/workflows/smoke-tests.yml
    needs: [file-changes, prepare-test-runner]
    if: needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'

  smoke-ha-tests:
    uses: ./.github/workflows/smoke-ha-tests.yml
    needs: [file-changes, prepare-test-runner]
    if: needs.file-changes.outputs.ha == 'true' || needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'

  ipoe-local-tests:
    uses: ./.github/workflows/ipoe-local-tests.yml
    needs: [file-changes, prepare-test-runner]
    if: needs.file-changes.outputs.sessions == 'true' || needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'

  pppoe-local-tests:
    uses: ./.github/workflows/pppoe-local-tests.yml
    needs: [file-changes, prepare-test-runner]
    if: needs.file-changes.outputs.sessions == 'true' || needs.file-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
