name: smoke-ha-tests

on:
  workflow_call:

jobs:
  smoke-ha:
    name: HA Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: osvbng-image
          path: /tmp

      - uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils sshpass
          sudo chmod 666 /dev/kvm || true

      - name: Run HA smoke tests
        run: |
          scripts/qemu/test-runner/scripts/vm-run-tests.sh \
            /tmp/test-runner.qcow2 \
            /tmp/osvbng-local.tar \
            02-smoke-ha \
            ./test-results

      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: HA Smoke Test Results
          path: test-results/out/02-smoke-ha-xunit.xml
          reporter: java-junit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-ha-test-results
          path: test-results/
          retention-days: 14
