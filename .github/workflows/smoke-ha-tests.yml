name: smoke-ha-tests

on:
  workflow_call:

jobs:
  smoke-ha:
    name: HA Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: osvbng-image
          path: /tmp

      - name: Load versions
        id: versions
        run: |
          source versions.env
          echo "test_runner_version=${TEST_RUNNER_VERSION}" >> $GITHUB_OUTPUT

      - name: Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils sshpass
          sudo chmod 666 /dev/kvm || true

      - name: Cache test runner image
        id: cache-test-runner
        uses: actions/cache@v4
        with:
          path: /tmp/test-runner.qcow2
          key: test-runner-${{ steps.versions.outputs.test_runner_version }}

      - name: Download test runner image
        if: steps.cache-test-runner.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.versions.outputs.test_runner_version }}" \
            --pattern "test-runner.qcow2.gz" \
            --output /tmp/test-runner.qcow2.gz
          gunzip /tmp/test-runner.qcow2.gz

      - name: Run HA smoke tests
        run: |
          scripts/qemu/test-runner/scripts/vm-run-tests.sh \
            /tmp/test-runner.qcow2 \
            /tmp/osvbng-local.tar \
            02-smoke-ha \
            ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-ha-test-results
          path: test-results/
          retention-days: 14
