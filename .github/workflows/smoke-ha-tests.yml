name: smoke-ha-tests

on:
  workflow_call:

jobs:
  smoke-ha:
    name: HA Smoke Tests
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-setup
        with:
          topology: tests/02-smoke-ha/02-smoke-ha.clab.yml

      - name: Run HA smoke tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/02-smoke-ha-log.html --report NONE tests/02-smoke-ha/

      - uses: ./.github/actions/test-cleanup
        if: always()
        with:
          topology: tests/02-smoke-ha/02-smoke-ha.clab.yml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-ha-test-results
          path: test-results/
          retention-days: 14
