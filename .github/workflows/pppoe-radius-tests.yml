name: pppoe-radius-tests

on:
  workflow_call:

jobs:
  pppoe-radius:
    name: PPPoE RADIUS Tests
    runs-on: self-hosted
    concurrency:
      group: integration-tests
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: make docker-local

      - name: Run PPPoE RADIUS tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/06-pppoe-radius-log.html --report NONE tests/06-pppoe-radius/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pppoe-radius-test-results
          path: test-results/
          retention-days: 14
