name: ipoe-linux-client-tests

on:
  workflow_call:

jobs:
  ipoe-linux-client:
    name: IPoE Linux Client (${{ matrix.subscriber }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        subscriber: [alpine, debian, ubuntu]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: osvbng-image
          path: /tmp

      - uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Pull bngtester image
        env:
          SUBSCRIBER: ${{ matrix.subscriber }}
        run: |
          docker pull "veesixnetworks/bngtester:${SUBSCRIBER}-latest"
          docker save "veesixnetworks/bngtester:${SUBSCRIBER}-latest" -o "/tmp/bngtester-${SUBSCRIBER}.tar"

      - name: Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils sshpass
          sudo chmod 666 /dev/kvm || true

      - name: Run IPoE linux client tests
        env:
          SUBSCRIBER: ${{ matrix.subscriber }}
          ROBOT_EXTRA_ARGS: "--variable subscriber-image:veesixnetworks/bngtester:${{ matrix.subscriber }}-latest"
        run: |
          scripts/qemu/test-runner/scripts/vm-run-tests.sh \
            /tmp/test-runner.qcow2 \
            /tmp/osvbng-local.tar \
            18-ipoe-linux-client \
            ./test-results \
            "/tmp/bngtester-${SUBSCRIBER}.tar"

      - name: Test report
        if: ${{ !cancelled() }}
        uses: joonvena/robotframework-reporter-action@v2.5
        with:
          gh_access_token: ${{ secrets.GITHUB_TOKEN }}
          report_path: test-results/out
          only_summary: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipoe-linux-client-${{ matrix.subscriber }}-test-results
          path: test-results/
          retention-days: 14
