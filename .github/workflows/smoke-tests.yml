name: smoke-tests

on:
  workflow_call:

jobs:
  smoke:
    name: Smoke Tests
    runs-on: self-hosted
    concurrency:
      group: integration-tests
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: make docker-local

      - name: Run smoke tests
        run: |
          mkdir -p test-results
          robot --loglevel DEBUG --output test-results/output.xml --log test-results/01-smoke-log.html --report NONE tests/01-smoke/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 14
